name: "Sync: production → main"

on:
  push:
    branches: [production]

jobs:
  sync:
    name: "Sync: merge production into main"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge production into main
        run: |
          # Check if production has commits that main doesn't
          DIFF=$(git log origin/main..origin/production --oneline)
          if [ -z "$DIFF" ]; then
            echo "main and production are in sync. Nothing to do."
            exit 0
          fi

          echo "Syncing production → main:"
          echo "$DIFF"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/production --no-edit -m "Sync: merge production into main [skip ci]"
          git push origin main
