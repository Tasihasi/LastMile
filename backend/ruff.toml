target-version = "py311"
line-length = 120

[lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "D"]
ignore = [
    "E501",
    "D100",  # Missing docstring in public module (modules don't all need a header doc)
    "D104",  # Missing docstring in public package
    "D105",  # Missing docstring in magic method (__str__, __repr__ etc.)
    "D106",  # Missing docstring in nested class (Meta on Django models, etc.)
    "D107",  # Missing docstring in __init__
    "D203",  # 1 blank line required before class docstring (incompatible with D211)
    "D213",  # Multi-line docstring summary should start at the second line (incompatible with D212)
]

[lint.pydocstyle]
convention = "google"

[lint.per-file-ignores]
# Tests describe behavior in their function names; docstrings add noise.
"**/tests.py" = ["D"]
"**/test_*.py" = ["D"]
# Django-generated / framework boilerplate.
"**/migrations/*" = ["D"]
"**/admin.py" = ["D"]
"**/apps.py" = ["D"]
"**/urls.py" = ["D"]
"config/settings.py" = ["D"]
"config/asgi.py" = ["D"]
"config/wsgi.py" = ["D"]
"manage.py" = ["D"]

[lint.isort]
known-first-party = ["planner", "config"]
